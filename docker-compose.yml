services:

  postgres:
    image: postgres:16
    container_name: fleet-postgres
    environment:
      POSTGRES_DB: fleetdb
      POSTGRES_USER: fleetuser
      POSTGRES_PASSWORD: fleetpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    build: .
    container_name: fleet-api
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:postgresql://postgres:5432/fleetdb
      DB_USERNAME: fleetuser
      DB_PASSWORD: fleetpassword
      JWT_SECRET: your-super-secret-jwt-key-change-me

volumes:
  postgres-data: